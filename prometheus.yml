global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'postgres_metrics'
    static_configs:
      - targets: [
          'postgres_exporter_id:9187', 
          'postgres_exporter_ops1:9187', 
          'postgres_exporter_ops2:9187'
        ]
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alert_rules.yml" 